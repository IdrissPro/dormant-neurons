redo:
  enabled: true

  # Trigger logic
  mode: "scheduled"            # "scheduled" | "conditioned"
  redo_every_updates: 5000

  patience: 3                  # only used if conditioned
  target_dormant_frac: 0.25    # only used if conditioned

  # Selection of dormant neurons
  selection: "activation"      # "activation" | "gradient"
  tau: 0.025
  grad_quantile: 0.10

  # Scope: PPO has actor/critic backbones; SAC has actor + q1/q2; DQN has q backbone
  scope: "shared_trunk"        # "policy_only" | "value_only" | "shared_trunk" | "all"
  layers: []                   # optional explicit layer names; empty => use all linears in scope

  # Reinitialization strategy
  init_mode: "xavier_uniform"  # "xavier_uniform" | "orthogonal"
  reset_bias: true
  outgoing: "zero"             # "zero" | "random"
  reset_optimizer_state: true

  # Safety cap
  max_recycled_frac_per_layer: 0.5
