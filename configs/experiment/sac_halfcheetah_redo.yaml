# @package _global_
defaults:
  - /base
  - /algo: sac
  - /env: halfcheetah
  - /redo: redo_default
  - _self_

seed: 1

instrumentation:
  enabled: true
  probe_batch_size: 512
  metric_every_updates: 500
  heavy_metric_every_updates: 2000

redo:
  scope: "all"                 # actor + q1 + q2
  selection: "activation"
  tau: 0.025
  redo_every_updates: 5000

#Added
run:
  total_env_steps: 200000