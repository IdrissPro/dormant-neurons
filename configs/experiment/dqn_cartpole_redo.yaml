# configs/experiment/dqn_cartpole_redo.yaml
defaults:
  - /base
  - /algo/dqn
  - /env/cartpole
  - /redo/redo_default

seed: 1

instrumentation:
  enabled: true
  probe_batch_size: 512
  metric_every_updates: 500
  heavy_metric_every_updates: 2000

redo:
  scope: "shared_trunk"         # DQN uses q.backbone as "trunk"
  selection: "activation"
  tau: 0.025
  redo_every_updates: 5000

run:
  total_env_steps: 500000
