# DQN defaults
algo:
  name: "dqn"

  # replay + training
  buffer_size: 1000000
  learning_starts: 80000
  batch_size: 256
  train_frequency: 4
  gradient_steps: 1
  target_network_frequency: 1000
  tau: 1.0

  # optimization
  lr: 2.5e-4
  gamma: 0.99
  max_grad_norm: 10.0

  # exploration
  exploration_fraction: 0.1
  eps_start: 1.0
  eps_end: 0.05

  # network
  hidden_dims: [256, 256]
  activation: "relu"
  layernorm: false

